services:
  postgres:
    image: postgres:15
    container_name: mini_ci_postgres
    environment:
      POSTGRES_DB: mini_ci
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mini_ci_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: mini_ci_api
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app

  worker:
    build: .
    container_name: mini_ci_worker
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: rq worker mini-ci --url redis://redis:6379/0
    volumes:
      - .:/app

volumes:
  postgres_data:
