services:
  postgres:
    image: postgres:15
    container_name: mini_ci_postgres
    environment:
      POSTGRES_DB: mini_ci
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: mini_ci_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
